<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">


<title>残高推移</title>


<link rel="stylesheet" href="../CSS/common.css">

<link rel="stylesheet" href="../CSS/style_balance_graph.css">


</head>


<body>


<header>


    <button
    class="back-button"
    onclick="location.replace('../index.html?reload=' + Date.now())">

    ← 戻る

    </button>


<h1>

残高推移

</h1>


</header>




<main>


<!-- 口座選択 -->

<div class="graph-item">


<label>

口座

</label>


<select id="account">


</select>


</div>




<!-- 期間選択 -->

<div class="graph-item">


<label>

期間

</label>


<select id="period">


<option value="all">

全て

</option>


<option value="year">

今年

</option>


<option value="month" selected>

今月

</option>


</select>


</div>





<!-- グラフ -->

<div class="graph-area">


<canvas id="balanceChart"></canvas>


</div>





<!-- 現在残高 -->

<div class="summary">


<div class="summary-item">


<span>

現在残高

</span>


<span id="current-balance">

¥0

</span>


</div>


</div>



</main>





<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>


<script src="../JS/supabase.js"></script>


<script src="../JS/balance_graph.js"></script>



</body>


</html>
