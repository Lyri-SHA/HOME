<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>家計簿入力</title>

<link rel="stylesheet" href="../CSS/common.css">

<link rel="stylesheet" href="../CSS/style_input.css">

</head>


<body>

<button class="back-button" onclick="location.href='../index.html'">
    戻る
</button>



<h1>
    家計簿入力
</h1>




<div class="input-area">


<label>
    日付
</label>

<input 
    type="date"
    id="date">



<label>
    カテゴリ
</label>

<select id="category">

    <option value="">
        カテゴリを選択
    </option>

    <option value="食費">
        食費
    </option>

    <option value="日用品">
        日用品
    </option>

    <option value="交通費">
        交通費
    </option>

    <option value="趣味・娯楽">
        趣味・娯楽
    </option>

    <option value="固定費">
        固定費（家賃・公共料金など）
    </option>

    <option value="PayPay">
        PayPay
    </option>

    <option value="majica">
        majica
    </option>

    <option value="その他">
        その他
    </option>

</select>



<label>
    内容
</label>

<input 
    type="text" 
    id="name"
    placeholder="例：スーパーで買い物">



<label>
    金額
</label>

<input 
    type="number" 
    id="price"
    placeholder="例：3000">



<label>
    メモ
</label>

<textarea 
    id="memo"
    placeholder="メモを入力">
</textarea>



<button onclick="addExpense()">
    登録
</button>


</div>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="../js/supabase.js"></script>

<script src="../js/input.js"></script>


</body>
