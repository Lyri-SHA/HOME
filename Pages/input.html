<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>家計簿入力</title>

<link rel="stylesheet" href="../CSS/common.css">

<link rel="stylesheet" href="../CSS/style_input.css">

</head>


<body>


<header>

    <button
    class="back-button"
    onclick="location.replace('../index.html?reload=' + Date.now())">

    ← 戻る

    </button>


    <h1>
        家計簿入力
    </h1>

</header>



<main class="input-area">


    <div class="input-item">

        <label>
            日付
        </label>

        <input 
            type="date"
            id="date">

    </div>




    <div class="input-item">

        <label>
            カテゴリ
        </label>


        <select id="category">

            <option value="">
                カテゴリを選択
            </option>

            <option value="食費">
                食費
            </option>

            <option value="日用品">
                日用品
            </option>

            <option value="交通費">
                交通費
            </option>

            <option value="娯楽">
                趣味・娯楽
            </option>

            <option value="固定費">
                固定費
            </option>

            <option value="PayPay">
                PayPay
            </option>

            <option value="majica">
                majica
            </option>

            <option value="その他">
                その他
            </option>

        </select>

    </div>




    <div class="input-item">

        <label>
            内容
        </label>

        <input
            type="text"
            id="name"
            placeholder="内容を入力">

    </div>




    <div class="input-item">

        <label>
            金額
        </label>

        <input
            type="number"
            id="price"
            placeholder="金額を入力">

    </div>




    <!-- 追加：クレジットカード -->

    <div class="input-item">

        <label>
            カード利用
        </label>


        <select id="credit_card_id">

            <option value="">
                なし
            </option>


        </select>


    </div>




    <div class="input-item">

        <label>
            メモ
        </label>

        <textarea
            id="memo"
            placeholder="メモを入力">
        </textarea>

    </div>




    <button class="register-button" onclick="addExpense()">

        登録

    </button>


</main>




<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="../JS/supabase.js"></script>

<script src="../JS/input.js"></script>


</body>

</html>
